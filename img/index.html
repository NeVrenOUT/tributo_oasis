<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tributo de banda | Oasis</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        
        <!-- Cabeçalho -->

        <div class="header">
            <h1 class="main-title">Oasis</h1>
            <p class="main-paragraph">Os "beatles" da nova geração.</p>
        </div>

        <!-- Imagem de destaque -->

        <div class="featured-image">
            <figure>
                <img src="../img/oasis-featured-img.png" alt="A banda Oasis">
                <figcaption>Integrantes da banda no ano de 1994.</figcaption>
            </figure>
        </div>

        <!-- Biografia -->

        <div class="biography-container">
            <h2>Sobre os anos iniciais da banda.</h2>
        </div>
    </div>
    
</body>
</html>
